<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Média</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }
        input {
            margin: 5px;
        }
        button {
            margin-top: 10px;
            padding: 8px;
        }
        footer {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Simulador de média semestral</h1>

    <form id="formNotas">
        <h3>N1</h3>
        Atividade 1: <input type="number" step="0.1" id="atv1"><br>
        Prova 1: <input type="number" step="0.1" id="prova1"><br>

        <h3>N2</h3>
        Prova Integrada: <input type="number" step="0.1" id="n2"><br>

        <h3>N3</h3>
        Atividade 2: <input type="number" step="0.1" id="atv2"><br>
        Prova 2: <input type="number" step="0.1" id="prova2"><br>

        <button type="button" onclick="calcular()">Calcular</button>
    </form>

    <h2 id="resultado"></h2>

    <footer>
        Desenvolvido por Gustavo Moisés da Costa
    </footer>

    <script>
        function validar(valor) {
            return valor !== "" && !isNaN(valor) && valor >= 0 && valor <= 10;
        }

        function calcular() {
            let atv1 = parseFloat(document.getElementById("atv1").value);
            let prova1 = parseFloat(document.getElementById("prova1").value);
            let n2 = parseFloat(document.getElementById("n2").value);
            let atv2 = parseFloat(document.getElementById("atv2").value);
            let prova2 = parseFloat(document.getElementById("prova2").value);

            if (
                !validar(atv1) || !validar(prova1) ||
                !validar(n2) || !validar(atv2) || !validar(prova2)
            ) {
                document.getElementById("resultado").innerHTML =
                    "Preencha todos os campos com valores entre 0 e 10.";
                return;
            }

            let N1 = (atv1 + prova1) / 2;
            let N3 = (atv2 + prova2) / 2;
            let media = (N1 + n2 + N3) / 3;

            let status = media >= 7 ? "Aprovado" : "Reprovado";

            document.getElementById("resultado").innerHTML =
                `Média: ${media.toFixed(2)} - ${status}`;
        }
    </script>

</body>
</html>
